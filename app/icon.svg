<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <rect width="64" height="64" rx="14" fill="#2367a0"/>
  <!-- Magnifying glass (search/SEO) -->
  <circle cx="27" cy="27" r="11" stroke="#68ccd1" stroke-width="3.5" fill="none"/>
  <line x1="35" y1="35" x2="46" y2="46" stroke="#68ccd1" stroke-width="3.5" stroke-linecap="round"/>
  <!-- Upward trend arrow inside lens -->
  <polyline points="21,31 25,25 29,28 33,22" stroke="#fff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <!-- Arrow tip -->
  <polyline points="30,22 33,22 33,25" stroke="#fff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
</svg>
